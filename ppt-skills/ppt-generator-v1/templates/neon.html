<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <!--
    Neon Theme Template for PPT Generator
    This is a reference template. The actual CSS is generated by themes/neon.py
    -->
</head>
<body>
    <!-- Animated Background -->
    <div class="background">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-bar" id="progressBar"></div>

    <!-- Slides Container -->
    <div class="slides-container" id="slidesContainer">
        {{slides}}
    </div>

    <!-- Navigation Hints -->
    <div class="nav-hints">
        <div class="nav-hint" onclick="prevSlide()">←</div>
        <div class="nav-hint" onclick="nextSlide()">→</div>
    </div>

    <!-- Slide Counter -->
    <div class="slide-counter" id="slideCounter">1 / 1</div>
</body>
</html>
